<!--
<table></table> define a tabela
    <caption> legenda da tabela
        <tr></tr> adiciona linha na tabela
        <th></th> adiciona uma célula de cabeçalho texto negrito
        <td></td> adiciona uma celula de dado com linha comum alinha a esquerda

        <theas></thead> cabeçalho da tabela
            <tbody></tbody> corpo da tabela
            <tfoot></tfoot> rodape

    -->
<!DOCTYPE html>
<html lang=pt-BR>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*ESTILO DA TABELA*/
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px;
        }

        h1 {
            font-size: 28px;
        }

        table {
            border-collapse: collapse;
            width: 70%;
            margin-top: 10px;

        }

        caption {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;

        }

        th,
        td {
            border: 1px solid #000;
            padding: 8px 12px;
            text-align: left;




        }

        th {
            background-color: #f1f1f1;
        }

        tfoot td {
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>tabela</h1>
    <table>
        <caption>cadastro de clientes</caption>
        <thead>
            <tr>
                <th>nome</th>
                <th>e-mail</th>
                <th>telefone</th>
                <th>cargo</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>caian</td>
                <td>caian@hotmail.com</td>
                <td>1132797057</td>
                <td>desenvolvedor</td>

            </tr>
            <tr>
                <td>caian</td>
                <td>caian@hotmail.com</td>
                <td>1132797057</td>
                <td>desenvolvedor</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3"></td>
                <td>total 3</td>
            </tr>
        </tfoot>

    </table>

</body>

</html>
